<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropMe | Full Image Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mesh-bg"></div>
    <div class="app-container">
        <header>
            <div class="logo-wrapper">
                <div class="glow-orb"></div>
                <div class="logo-icon"></div>
            </div>
            <h1>DropMe</h1>
            <p>The ultimate magic tool for your images. Just pick a mode and drop.</p>
        </header>

        <section class="glass-panel">
            <div class="mode-selector">
                <button class="mode-tab active" data-mode="compress">Compress Target Size</button>
                <button class="mode-tab" data-mode="convert">Format & Resize</button>
            </div>

            <div class="controls-grid">
                <div class="control-group" id="max-size-wrapper-container">
                    <label for="max-size">Target Max Size</label>
                    <div class="premium-input">
                        <input type="number" id="max-size" value="1.9" step="0.1" min="0.1" />
                        <span>MB</span>
                    </div>
                </div>
                
                <div class="control-group" id="max-bounds-wrapper-container" style="display: none;">
                    <label title="Leave empty to maintain original dimensions">Max Dimensions (Optional)</label>
                    <div style="display: flex; gap: 12px;">
                        <div class="premium-input" style="flex: 1; padding: 10px 14px;">
                            <input type="number" id="max-width" placeholder="Width (px)" />
                        </div>
                        <div class="premium-input" style="flex: 1; padding: 10px 14px;">
                            <input type="number" id="max-height" placeholder="Height (px)" />
                        </div>
                    </div>
                </div>

                <div class="control-group" style="grid-column: span 2;">
                    <label for="output-format">Saved the result as...</label>
                    <div class="premium-input">
                        <select id="output-format">
                            <option value="webp" selected>WebP</option>
                            <option value="jpeg">JPEG</option>
                            <option value="avif">AVIF</option>
                            <option value="png">PNG</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

        <section class="drop-zone" id="drop-zone">
            <div class="drop-zone-content">
                <div class="upload-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </div>
                <h2>Drag & Drop your PNGs here</h2>
                <p>or click to browse</p>
                <input type="file" id="file-input" multiple accept=".png">
            </div>
        </section>

        <section class="results-header" style="display: flex; justify-content: space-between; align-items: center; display: none;" id="results-header">
            <h3 style="font-size: 1.5rem;">Results</h3>
            <button id="download-zip" class="download-btn" style="display: none;">Download All (ZIP)</button>
        </section>

        <section class="results-container" id="results-container">
            <!-- Dynamic result cards will be appended here -->
        </section>
    </div>

    <!-- Hidden canvas for any future client side logic if needed, but not used now -->
    
    <script src="app.js"></script>
</body>
</html>
