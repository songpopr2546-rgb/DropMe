<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resize Dimensions | DropMe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page-mode="convert">
    <div class="mesh-bg"></div>
    <div class="app-container">
        
        <a href="index.html" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Home
        </a>

        <header style="padding-top: 0;">
            <h1 style="font-size: 2.5rem;">Resize Dimensions</h1>
            <p>Smart scale your images to specific pixel bounds</p>
        </header>

        <section class="glass-panel">
            <div class="controls-grid" style="grid-template-columns: 1fr; max-width: 400px; margin: 0 auto;">
                <div class="control-group" id="max-bounds-wrapper-container">
                    <label title="Leave empty to maintain original dimensions">Max Dimensions</label>
                    <div style="display: flex; gap: 12px;">
                        <div class="premium-input" style="flex: 1; padding: 10px 14px;">
                            <input type="number" id="max-width" placeholder="Width (px)" />
                        </div>
                        <div class="premium-input" style="flex: 1; padding: 10px 14px;">
                            <input type="number" id="max-height" placeholder="Height (px)" />
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="drop-zone" id="drop-zone">
            <div class="drop-zone-content">
                <div class="upload-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </div>
                <h2>Drag & Drop your images here</h2>
                <p>or click to browse</p>
                <input type="file" id="file-input" multiple>
            </div>
        </section>

        <section class="results-header" style="display: flex; justify-content: space-between; align-items: center; display: none;" id="results-header">
            <h3 style="font-size: 1.5rem;">Results</h3>
            <button id="download-zip" class="download-btn" style="display: none;">Download All (ZIP)</button>
        </section>

        <section class="results-container" id="results-container"></section>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
